name: domus_mobile
description: "EdTech learning platform mobile application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.5.0+1
  flutter_secure_storage: ^9.2.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  flutter_pdfview: ^1.3.2
  video_player: ^2.9.1
  chewie: ^1.8.1
  google_fonts: ^6.2.1
  go_router: ^14.2.1
  intl: ^0.19.0
  logger: ^2.4.0
  font_awesome_flutter: ^10.7.0
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/domus/
